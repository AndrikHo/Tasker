android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# The app and most plugins compile against SDK 36, but the transitive
# passkeys_doctor module (pulled by supabase_flutter, unused by us) hardcodes
# compileSdk 35. A shared AndroidX lib requires 36, so AGP fails the build over
# that one sibling module. The android-36 platform is installed and the app
# itself targets 36, so relax AGP's cross-module compileSdk enforcement.
android.experimental.disableCompileSdkChecks=true
